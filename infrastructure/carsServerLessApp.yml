AWSTemplateFormatVersion: "2010-09-09"
Parameters:
  environmentName:
    Type: String
    Description: The name of the environment to be deployed
  BucketName:
    Type: String
    Description: The name of the S3 bucket where the Lambda function code is stored
  CodeS3Key:
    Type: String
    Description: The key of the S3 object containing the Lambda function code
  LambdaVersion:
    Type: String
    Description: The version of the Lambda function code
  deploymentNumber:
    Type: String
    Description: The deployment number to be used in log group naming
  snsTopicArnSuccribingEmail:
    Type: String
    Description: The ARN of the SNS topic for subscribing email notifications
Resources:
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn
  dynnamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: car
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
  lamdaRoleToAccessDynammoDB:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lambda-dynamodb-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: lambda-dynamodb-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource: !GetAtt dynnamoDBTable.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/serverLessApp/${deploymentNumber}:*"
  carCreateLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "car-create-function-${LambdaVersion}"
      Handler: createCar.handler
      Role: !GetAtt lamdaRoleToAccessDynammoDB.Arn
      Runtime: nodejs20.x
      Code: 
        S3Bucket: !Ref BucketName
        S3Key: !Ref CodeS3Key
      Architectures:
        - x86_64
  carListLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "car-list-function-${LambdaVersion}"
      Handler: listCars.handler
      Role: !GetAtt lamdaRoleToAccessDynammoDB.Arn
      Runtime: nodejs20.x
      Code: 
        S3Bucket: !Ref BucketName
        S3Key: !Ref CodeS3Key
      Architectures:
        - x86_64
  carApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: CarAPI
  carApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt carApiGateway.RootResourceId
      PathPart: cars
      RestApiId: !Ref carApiGateway
  carCreateMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref carApiGateway
      ResourceId: !Ref carApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${carCreateLambdaFunction.Arn}/invocations
  carListMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref carApiGateway
      ResourceId: !Ref carApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${carListLambdaFunction.Arn}/invocations
  createCarLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref carCreateLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${carApiGateway}/*/POST/cars
  listCarLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref carListLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${carApiGateway}/*/GET/cars
  carApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - carCreateMethod
      - carListMethod
    Properties:
      RestApiId: !Ref carApiGateway
  carApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref environmentName
      RestApiId: !Ref carApiGateway
      DeploymentId: !Ref carApiDeployment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/serverLessApp/${deploymentNumber}"
      RetentionInDays: 7
  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: car-api-alarm-topic
      DisplayName: Car API Alarm Topic
  SnsTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: email
      Endpoint: !Ref snsTopicArnSuccribingEmail
  ExceptionMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/serverLessApp/${deploymentNumber}"
      FilterPattern: '"ERROR" "Exception"'
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: "CarAPI"
          MetricName: "CarApiExceptions"
    DependsOn: LogGroup
  CarApiExceptionAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: car-api-exception-alarm
      AlarmDescription: "Alarm for monitoring exceptions in Car API"
      Namespace: "CarAPI"
      MetricName: "CarApiExceptions"
      Statistic: Sum
      Period: 10
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref SnsTopic
Outputs:
  ApiListEndpoint:
    Description: "API Gateway endpoint URL for the Car API - The list GET method can be accessed at this URL"
    Value: !Sub "https://${carApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${environmentName}/cars"
  ApiCreateEndpoint:
    Description: "API Gateway endpoint URL for the Car API - The create POST method can be accessed at this URL"
    Value: !Sub "https://${carApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${environmentName}/cars"
