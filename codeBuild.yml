version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - cd src/lambda
      - ls
      - pwd
      - npm init -y
      - npm install @aws-sdk/client-dynamodb @aws-sdk/lib-dynamodb
      - npm ci
  build:
    commands:
      - echo Build started on `date`
      - zip ${ZipFileName} *.js
      - cd ../../
      - cp src/lambda/${ZipFileName} .
  post_build:
    commands:
      - echo Build completed on `date`
      - echo "Uploading Lambda code to S3..."
      - aws s3 cp ${ZipFileName} s3://${ARTIFACTS_BUCKET}/${CodeS3Key}/${ZipFileName}
      - echo "Lambda code uploaded successfully"

artifacts:
  files:
    - infrastructure/template.yaml
